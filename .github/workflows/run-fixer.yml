# =============================================================================
# TheFixer — Bug Fixes & Changes Pipeline
# =============================================================================
# 8 agents. Surgical fixes, ~5 min wall time.
# Pipeline: Plan → Fix (parallel backend + frontend) → Verify + Security
# =============================================================================

name: "Run TheFixer"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to fix (leave blank for default)"
        required: false
        default: ""
      fix_description:
        description: "High-level description of what needs fixing"
        required: true
        default: "Address findings from latest audit"
      plan_file:
        description: "Path to plan file (optional)"
        required: false
        default: ""

concurrency:
  group: fixer-${{ github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  TEAM_DIR: "Teams/TheFixer"

jobs:

  plan:
    name: "Planner"
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.branch.outputs.name }}
      run_id: ${{ steps.init.outputs.run_id }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Create fix branch
        id: branch
        run: |
          BRANCH="fix/fixer-$(date +%s)-$(echo $RANDOM | md5sum | head -c 8)"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT

      - name: Initialize dashboard
        id: init
        run: |
          RUN_ID=$(bash tools/pipeline-update.sh --team TheFixer --action init \
            --metrics "{\"task_title\": \"${{ inputs.fix_description }}\"}")
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Run Planner
        run: |
          PLAN_FLAG=""
          if [ -n "${{ inputs.plan_file }}" ]; then
            PLAN_FLAG="Plan file: ${{ inputs.plan_file }}"
          fi

          claude --model claude-haiku-4-5 \
            --system-prompt "$(cat $TEAM_DIR/planner.md)" \
            --allowedTools "Read,Glob,Grep" \
            --print \
            --dangerously-skip-permissions \
            "Read the codebase. Produce a fix plan with scope tags.
            Fix: ${{ inputs.fix_description }}
            $PLAN_FLAG" > fix-plan.md

      - name: Push
        run: |
          git add -A
          git commit -m "Fix plan: ${{ inputs.fix_description }}

          Co-Authored-By: agent:planner <agent@dev-crew>" || true
          git push origin ${{ steps.branch.outputs.name }}

  backend-fix:
    name: "Backend Fixer"
    needs: plan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan.outputs.branch }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Dashboard — start
        run: |
          bash tools/pipeline-update.sh --team TheFixer --run ${{ needs.plan.outputs.run_id }} \
            --agent backend-fixer --action start --name "Backend Fixer" --model sonnet

      - name: Run Backend Fixer
        run: |
          claude --model claude-sonnet-4-6 \
            --system-prompt "$(cat $TEAM_DIR/backend-fixer.md)" \
            --allowedTools "Read,Write,Edit,Bash,Glob,Grep" \
            "Apply backend fixes for: ${{ inputs.fix_description }}
            Read fix-plan.md for scope. Max 5 fix cycles. Update tests.
            Stay within Source/Backend/."

      - name: Dashboard — complete
        if: always()
        run: |
          bash tools/pipeline-update.sh --team TheFixer --run ${{ needs.plan.outputs.run_id }} \
            --agent backend-fixer --action complete

      - name: Push
        run: |
          git add -A
          git commit -m "Backend fix applied

          Co-Authored-By: agent:backend-fixer <agent@dev-crew>" || true
          git push origin HEAD

  frontend-fix:
    name: "Frontend Fixer"
    needs: plan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan.outputs.branch }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Dashboard — start
        run: |
          bash tools/pipeline-update.sh --team TheFixer --run ${{ needs.plan.outputs.run_id }} \
            --agent frontend-fixer --action start --name "Frontend Fixer" --model sonnet

      - name: Run Frontend Fixer
        run: |
          claude --model claude-sonnet-4-6 \
            --system-prompt "$(cat $TEAM_DIR/frontend-fixer.md)" \
            --allowedTools "Read,Write,Edit,Bash,Glob,Grep" \
            "Apply frontend fixes for: ${{ inputs.fix_description }}
            Read fix-plan.md for scope. Max 5 fix cycles. Wiring audit.
            Stay within Source/Frontend/."

      - name: Dashboard — complete
        if: always()
        run: |
          bash tools/pipeline-update.sh --team TheFixer --run ${{ needs.plan.outputs.run_id }} \
            --agent frontend-fixer --action complete

      - name: Push
        run: |
          git add -A
          git commit -m "Frontend fix applied

          Co-Authored-By: agent:frontend-fixer <agent@dev-crew>" || true
          git push origin HEAD

  verify:
    name: "Verify & Report"
    needs: [plan, backend-fix, frontend-fix]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan.outputs.branch }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Verification
        run: |
          claude --model claude-sonnet-4-6 \
            --system-prompt "$(cat $TEAM_DIR/verify-reporter.md)" \
            --allowedTools "Read,Write,Bash,Glob,Grep" \
            "Run full test suite. Smoke test. Generate traceability report.
            Verify fix for: ${{ inputs.fix_description }}"

      - name: Run Security Spot-Check
        run: |
          claude --model claude-haiku-4-5 \
            --system-prompt "$(cat $TEAM_DIR/security-spotter.md)" \
            --allowedTools "Read,Glob,Grep" \
            --print \
            --dangerously-skip-permissions \
            "Read-only security spot-check on the diff.
            Focus on the changes made for: ${{ inputs.fix_description }}" > security-check.md

      - name: Push
        run: |
          git add -A
          git commit -m "Verification and security check complete

          Co-Authored-By: agent:verify-reporter <agent@dev-crew>" || true
          git push origin HEAD

      - name: Create PR
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ needs.plan.outputs.branch }}';
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[TheFixer] ${{ inputs.fix_description }}`.substring(0, 70),
              head: branch,
              base: 'master',
              body: [
                '## Fix Summary',
                `**Fix:** ${{ inputs.fix_description }}`,
                '',
                '## Pipeline',
                '- [x] Planner',
                '- [x] Backend Fixer',
                '- [x] Frontend Fixer',
                '- [x] Verify & Report',
                '- [x] Security Spot-Check',
                '',
                '🔧 Generated by dev-crew TheFixer pipeline',
              ].join('\n'),
            });
            console.log(`PR: #${pr.data.number}`);
