# =============================================================================
# TheFixer — Bug Fixes & Changes Pipeline
# =============================================================================
# 8 agents. Surgical fixes, ~5 min wall time.
# Pipeline: Plan → Fix (parallel backend + frontend) → Verify + Security
# =============================================================================

name: "Run TheFixer"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to fix (leave blank for default)"
        required: false
        default: ""
      fix_description:
        description: "High-level description of what needs fixing"
        required: true
        default: "Address findings from latest audit"
      plan_file:
        description: "Path to plan file (optional)"
        required: false
        default: ""

concurrency:
  group: fixer-${{ github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  TEAM_DIR: "Teams/TheFixer"
  FIX_DESC: ${{ inputs.fix_description }}

jobs:

  plan:
    name: "Planner"
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.branch.outputs.name }}
      run_id: ${{ steps.init.outputs.run_id }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup Claude credentials
        env:
          CLAUDE_CREDENTIALS: ${{ secrets.CLAUDE_CREDENTIALS }}
        run: bash tools/setup-claude-credentials.sh

      - name: Create fix branch
        id: branch
        run: |
          BRANCH="fix/fixer-$(date +%s)-$(echo $RANDOM | md5sum | head -c 8)"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT

      - name: Initialize dashboard
        id: init
        run: |
          FIX_TITLE=$(printf '%s' "$FIX_DESC" | head -1)
          jq -n --arg t "$FIX_TITLE" '{"task_title": $t}' > /tmp/fixer-metrics.json
          RUN_ID=$(bash tools/pipeline-update.sh --team TheFixer --action init \
            --metrics "$(cat /tmp/fixer-metrics.json)")
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Upload pipeline state
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-state-fixer
          path: tools/pipeline-state-TheFixer.json

      - name: Run Planner
        run: |
          PLAN_FLAG=""
          if [ -n "${{ inputs.plan_file }}" ]; then
            PLAN_FLAG="Plan file: ${{ inputs.plan_file }}"
          fi

          printf 'Fix: %s\n%s\nRead the codebase. Produce a fix plan with scope tags.' \
            "$FIX_DESC" "$PLAN_FLAG" > /tmp/prompt.txt

          bash tools/claude-with-retry.sh --model claude-haiku-4-5 \
            --system-prompt "$(cat $TEAM_DIR/planner.md)" \
            --allowedTools "Read,Glob,Grep" \
            --print \
            --dangerously-skip-permissions \
            "$(cat /tmp/prompt.txt)" > fix-plan.md

      - name: Push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git diff --cached --quiet || git commit -m "Fix plan: $FIX_DESC

          Co-Authored-By: agent:planner <agent@dev-crew>"
          git push origin ${{ steps.branch.outputs.name }}

  backend-fix:
    name: "Backend Fixer"
    needs: plan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan.outputs.branch }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup Claude credentials
        env:
          CLAUDE_CREDENTIALS: ${{ secrets.CLAUDE_CREDENTIALS }}
        run: bash tools/setup-claude-credentials.sh

      - name: Download pipeline state
        uses: actions/download-artifact@v4
        with:
          name: pipeline-state-fixer
          path: tools/

      - name: Dashboard — start
        continue-on-error: true
        run: |
          bash tools/pipeline-update.sh --team TheFixer --run ${{ needs.plan.outputs.run_id }} \
            --agent backend-fixer --action start --name "Backend Fixer" --model sonnet

      - name: Run Backend Fixer
        run: |
          printf 'Apply backend fixes for: %s\nRead fix-plan.md for scope. Max 5 fix cycles. Update tests.\nStay within Source/Backend/.' \
            "$FIX_DESC" > /tmp/prompt.txt
          bash tools/claude-with-retry.sh --model claude-sonnet-4-6 \
            --system-prompt "$(cat $TEAM_DIR/backend-fixer.md)" \
            --allowedTools "Read,Write,Edit,Bash,Glob,Grep" \
            --print \
            --dangerously-skip-permissions \
            "$(cat /tmp/prompt.txt)"

      - name: Dashboard — complete
        continue-on-error: true
        if: always()
        run: |
          bash tools/pipeline-update.sh --team TheFixer --run ${{ needs.plan.outputs.run_id }} \
            --agent backend-fixer --action complete

      - name: Push
        run: |
          bash tools/git-push.sh "${{ needs.plan.outputs.branch }}" "Backend fix applied

          Co-Authored-By: agent:backend-fixer <agent@dev-crew>"

  frontend-fix:
    name: "Frontend Fixer"
    needs: plan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan.outputs.branch }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup Claude credentials
        env:
          CLAUDE_CREDENTIALS: ${{ secrets.CLAUDE_CREDENTIALS }}
        run: bash tools/setup-claude-credentials.sh

      - name: Download pipeline state
        uses: actions/download-artifact@v4
        with:
          name: pipeline-state-fixer
          path: tools/

      - name: Dashboard — start
        continue-on-error: true
        run: |
          bash tools/pipeline-update.sh --team TheFixer --run ${{ needs.plan.outputs.run_id }} \
            --agent frontend-fixer --action start --name "Frontend Fixer" --model sonnet

      - name: Run Frontend Fixer
        run: |
          printf 'Apply frontend fixes for: %s\nRead fix-plan.md for scope. Max 5 fix cycles. Wiring audit.\nStay within Source/Frontend/.' \
            "$FIX_DESC" > /tmp/prompt.txt
          bash tools/claude-with-retry.sh --model claude-sonnet-4-6 \
            --system-prompt "$(cat $TEAM_DIR/frontend-fixer.md)" \
            --allowedTools "Read,Write,Edit,Bash,Glob,Grep" \
            --print \
            --dangerously-skip-permissions \
            "$(cat /tmp/prompt.txt)"

      - name: Dashboard — complete
        continue-on-error: true
        if: always()
        run: |
          bash tools/pipeline-update.sh --team TheFixer --run ${{ needs.plan.outputs.run_id }} \
            --agent frontend-fixer --action complete

      - name: Push
        run: |
          bash tools/git-push.sh "${{ needs.plan.outputs.branch }}" "Frontend fix applied

          Co-Authored-By: agent:frontend-fixer <agent@dev-crew>"

  verify:
    name: "Verify & Report"
    needs: [plan, backend-fix, frontend-fix]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.plan.outputs.branch }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup Claude credentials
        env:
          CLAUDE_CREDENTIALS: ${{ secrets.CLAUDE_CREDENTIALS }}
        run: bash tools/setup-claude-credentials.sh

      - name: Run Verification
        run: |
          printf 'Run full test suite. Smoke test. Generate traceability report.\nVerify fix for: %s' \
            "$FIX_DESC" > /tmp/prompt.txt
          bash tools/claude-with-retry.sh --model claude-sonnet-4-6 \
            --system-prompt "$(cat $TEAM_DIR/verify-reporter.md)" \
            --allowedTools "Read,Write,Bash,Glob,Grep" \
            --print \
            --dangerously-skip-permissions \
            "$(cat /tmp/prompt.txt)"

      - name: Run Security Spot-Check
        run: |
          printf 'Read-only security spot-check on the diff.\nFocus on the changes made for: %s' \
            "$FIX_DESC" > /tmp/security-prompt.txt
          bash tools/claude-with-retry.sh --model claude-haiku-4-5 \
            --system-prompt "$(cat $TEAM_DIR/security-spotter.md)" \
            --allowedTools "Read,Glob,Grep" \
            --print \
            --dangerously-skip-permissions \
            "$(cat /tmp/security-prompt.txt)" > security-check.md

      - name: Push
        run: |
          bash tools/git-push.sh "${{ needs.plan.outputs.branch }}" "Verification and security check complete

          Co-Authored-By: agent:verify-reporter <agent@dev-crew>"

      - name: Create PR
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ needs.plan.outputs.branch }}';
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[TheFixer] ${process.env.FIX_DESC || ""}`.substring(0, 70),
              head: branch,
              base: context.payload.repository.default_branch,
              body: [
                '## Fix Summary',
                `**Fix:** ${process.env.FIX_DESC || ""}`,
                '',
                '## Pipeline',
                '- [x] Planner',
                '- [x] Backend Fixer',
                '- [x] Frontend Fixer',
                '- [x] Verify & Report',
                '- [x] Security Spot-Check',
                '',
                '🔧 Generated by dev-crew TheFixer pipeline',
              ].join('\n'),
            });
            console.log(`PR: #${pr.data.number}`);
