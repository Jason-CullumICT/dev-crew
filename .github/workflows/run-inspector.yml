# =============================================================================
# TheInspector — System Health Audit Pipeline
# =============================================================================
# 5 agents. Config-driven spec-drift, performance, chaos, dependency auditing.
# Pipeline: Init → Quality Oracle + Dependency Auditor (parallel)
#                → Performance Profiler + Chaos Monkey (parallel, dynamic only)
#                → Synthesize → PR
# =============================================================================

name: "Run TheInspector"

on:
  schedule:
    - cron: "0 2 * * *"  # 02:00 UTC daily

  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to audit (leave blank for default)"
        required: false
        default: ""
      focus:
        description: "Optional focus areas (e.g. 'auth routes, state machine')"
        required: false
        default: ""
      mode:
        description: "Audit mode"
        required: false
        type: choice
        default: "static"
        options:
          - static    # no live environment needed
          - dynamic   # spins up services for perf/chaos

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  TEAM_DIR: "Teams/TheInspector"

jobs:

  # ---------------------------------------------------------------------------
  # Stage 1: Initialize — branch, dashboard, spec-drift
  # ---------------------------------------------------------------------------
  init:
    name: "Initialize"
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.branch.outputs.name }}
      run_id: ${{ steps.init.outputs.run_id }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup Claude credentials
        env:
          CLAUDE_CREDENTIALS: ${{ secrets.CLAUDE_CREDENTIALS }}
        run: bash tools/setup-claude-credentials.sh

      - name: Create audit branch
        id: branch
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="audit/inspector-${DATE}-$(echo $RANDOM | md5sum | head -c 6)"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT

      - name: Initialize dashboard
        id: init
        run: |
          RUN_ID=$(bash tools/pipeline-update.sh --team TheInspector --action init \
            --metrics "{\"task_title\": \"Health Audit\", \"focus\": \"${{ inputs.focus }}\"}")
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Upload pipeline state
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-state-inspector
          path: tools/pipeline-state-TheInspector.json

      - name: Audit plan
        run: |
          echo "========================================"
          echo "  TheInspector — Audit Plan"
          echo "========================================"
          echo "  Mode  : ${{ inputs.mode || 'static' }}"
          echo "  Focus : ${{ inputs.focus || 'full audit' }}"
          echo ""
          echo "  Agents:"
          echo "    ✓ Quality Oracle       (always)"
          echo "    ✓ Dependency Auditor   (always)"
          if [ "${{ inputs.mode }}" = "dynamic" ]; then
            echo "    ✓ Performance Profiler (dynamic mode)"
            echo "    ✓ Chaos Monkey         (dynamic mode)"
            echo ""
            echo "  Pre-flight: will verify docker-compose.test.yml starts before"
            echo "  spawning dynamic agents — fails fast if services cannot start."
          else
            echo "    — Performance Profiler (skipped — static mode, no live services)"
            echo "    — Chaos Monkey         (skipped — static mode, no live services)"
          fi
          echo "========================================"

      - name: Pre-flight check (dynamic mode)
        if: inputs.mode == 'dynamic'
        run: |
          if [ ! -f docker-compose.test.yml ]; then
            echo "ERROR: docker-compose.test.yml not found — dynamic mode requires this file to start live services"
            exit 1
          fi
          echo "Starting services for pre-flight check..."
          docker compose -f docker-compose.test.yml up -d --build
          echo "Waiting for services to become healthy (up to 90s)..."
          DEADLINE=$(($(date +%s) + 90))
          HEALTHY=0
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            HEALTHY=$(docker compose -f docker-compose.test.yml ps -q | xargs -r docker inspect --format='{{.State.Health.Status}}' 2>/dev/null | grep -c "^healthy$" || true)
            if [ "${HEALTHY:-0}" -gt 0 ]; then
              break
            fi
            sleep 5
          done
          if [ "${HEALTHY:-0}" -eq 0 ]; then
            echo "ERROR: No services became healthy within 90s. Cannot run dynamic agents."
            echo ""
            docker compose -f docker-compose.test.yml logs
            docker compose -f docker-compose.test.yml down -v
            exit 1
          fi
          echo "Pre-flight OK — $HEALTHY service(s) healthy:"
          docker compose -f docker-compose.test.yml ps
          docker compose -f docker-compose.test.yml down -v

      - name: Run Spec-Drift Audit
        run: python3 tools/spec-drift-audit.py || true

      - name: Push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git diff --cached --quiet || git commit -m "Inspector audit: initialize

          Co-Authored-By: agent:inspector <agent@dev-crew>"
          git push origin ${{ steps.branch.outputs.name }}

  # ---------------------------------------------------------------------------
  # Stage 2: Audit agents (parallel)
  # ---------------------------------------------------------------------------
  quality-oracle:
    name: "Quality Oracle"
    needs: init
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.init.outputs.branch }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup Claude credentials
        env:
          CLAUDE_CREDENTIALS: ${{ secrets.CLAUDE_CREDENTIALS }}
        run: bash tools/setup-claude-credentials.sh

      - name: Download pipeline state
        uses: actions/download-artifact@v4
        with:
          name: pipeline-state-inspector
          path: tools/

      - name: Dashboard — start
        run: |
          bash tools/pipeline-update.sh --team TheInspector --run ${{ needs.init.outputs.run_id }} \
            --agent quality-oracle --action start --name "Quality Oracle" --model sonnet

      - name: Run Quality Oracle
        run: |
          printf 'Spec-drift analysis and pattern enforcement.\nConfig: %s/inspector.config.yml\nFocus: %s' \
            "$TEAM_DIR" "${{ inputs.focus || 'full audit' }}" > /tmp/prompt.txt

          claude --model claude-sonnet-4-6 \
            --system-prompt "$(cat $TEAM_DIR/quality-oracle.md)" \
            --allowedTools "Read,Glob,Grep,Bash" \
            --print \
            --dangerously-skip-permissions \
            "$(cat /tmp/prompt.txt)" > quality-oracle-report.md

      - name: Dashboard — complete
        if: always()
        run: |
          bash tools/pipeline-update.sh --team TheInspector --run ${{ needs.init.outputs.run_id }} \
            --agent quality-oracle --action complete

      - name: Push
        run: |
          bash tools/git-push.sh "${{ needs.init.outputs.branch }}" "Quality Oracle report

          Co-Authored-By: agent:quality-oracle <agent@dev-crew>"

  dependency-auditor:
    name: "Dependency Auditor"
    needs: init
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.init.outputs.branch }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup Claude credentials
        env:
          CLAUDE_CREDENTIALS: ${{ secrets.CLAUDE_CREDENTIALS }}
        run: bash tools/setup-claude-credentials.sh

      - name: Download pipeline state
        uses: actions/download-artifact@v4
        with:
          name: pipeline-state-inspector
          path: tools/

      - name: Dashboard — start
        run: |
          bash tools/pipeline-update.sh --team TheInspector --run ${{ needs.init.outputs.run_id }} \
            --agent dependency-auditor --action start --name "Dependency Auditor" --model haiku

      - name: Run Dependency Auditor
        run: |
          printf 'CVE scanning, license compliance, outdated package check.\nConfig: %s/inspector.config.yml' \
            "$TEAM_DIR" > /tmp/prompt.txt

          claude --model claude-haiku-4-5 \
            --system-prompt "$(cat $TEAM_DIR/dependency-auditor.md)" \
            --allowedTools "Read,Bash,Glob,Grep" \
            --print \
            --dangerously-skip-permissions \
            "$(cat /tmp/prompt.txt)" > dependency-auditor-report.md

      - name: Dashboard — complete
        if: always()
        run: |
          bash tools/pipeline-update.sh --team TheInspector --run ${{ needs.init.outputs.run_id }} \
            --agent dependency-auditor --action complete

      - name: Push
        run: |
          bash tools/git-push.sh "${{ needs.init.outputs.branch }}" "Dependency Auditor report

          Co-Authored-By: agent:dependency-auditor <agent@dev-crew>"

  performance-profiler:
    name: "Performance Profiler"
    needs: init
    if: inputs.mode == 'dynamic'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.init.outputs.branch }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup Claude credentials
        env:
          CLAUDE_CREDENTIALS: ${{ secrets.CLAUDE_CREDENTIALS }}
        run: bash tools/setup-claude-credentials.sh

      - name: Start services
        run: |
          docker compose -f docker-compose.test.yml up -d
          DEADLINE=$(($(date +%s) + 60))
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            HEALTHY=$(docker compose -f docker-compose.test.yml ps -q | xargs -r docker inspect --format='{{.State.Health.Status}}' 2>/dev/null | grep -c "^healthy$" || true)
            if [ "${HEALTHY:-0}" -gt 0 ]; then echo "Services ready"; break; fi
            sleep 5
          done
          if [ "${HEALTHY:-0}" -eq 0 ]; then
            echo "ERROR: Services did not become healthy within 60s"
            docker compose -f docker-compose.test.yml logs
            exit 1
          fi

      - name: Run Performance Profiler
        run: |
          printf 'Performance profiling against live services.\nConfig: %s/inspector.config.yml' \
            "$TEAM_DIR" > /tmp/prompt.txt
          claude --model claude-sonnet-4-6 \
            --system-prompt "$(cat $TEAM_DIR/performance-profiler.md)" \
            --allowedTools "Read,Bash,Glob,Grep" \
            --print \
            --dangerously-skip-permissions \
            "$(cat /tmp/prompt.txt)" > performance-profiler-report.md

      - name: Tear down services
        if: always()
        run: docker compose -f docker-compose.test.yml down -v || true

      - name: Push
        run: |
          bash tools/git-push.sh "${{ needs.init.outputs.branch }}" "Performance Profiler report

          Co-Authored-By: agent:performance-profiler <agent@dev-crew>"

  chaos-monkey:
    name: "Chaos Monkey"
    needs: init
    if: inputs.mode == 'dynamic'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.init.outputs.branch }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup Claude credentials
        env:
          CLAUDE_CREDENTIALS: ${{ secrets.CLAUDE_CREDENTIALS }}
        run: bash tools/setup-claude-credentials.sh

      - name: Start services
        run: |
          docker compose -f docker-compose.test.yml up -d
          DEADLINE=$(($(date +%s) + 60))
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            HEALTHY=$(docker compose -f docker-compose.test.yml ps -q | xargs -r docker inspect --format='{{.State.Health.Status}}' 2>/dev/null | grep -c "^healthy$" || true)
            if [ "${HEALTHY:-0}" -gt 0 ]; then echo "Services ready"; break; fi
            sleep 5
          done
          if [ "${HEALTHY:-0}" -eq 0 ]; then
            echo "ERROR: Services did not become healthy within 60s"
            docker compose -f docker-compose.test.yml logs
            exit 1
          fi

      - name: Run Chaos Monkey
        run: |
          printf 'Fault injection and invariant analysis.\nConfig: %s/inspector.config.yml' \
            "$TEAM_DIR" > /tmp/prompt.txt
          claude --model claude-sonnet-4-6 \
            --system-prompt "$(cat $TEAM_DIR/chaos-monkey.md)" \
            --allowedTools "Read,Bash,Glob,Grep" \
            --print \
            --dangerously-skip-permissions \
            "$(cat /tmp/prompt.txt)" > chaos-monkey-report.md

      - name: Tear down services
        if: always()
        run: docker compose -f docker-compose.test.yml down -v || true

      - name: Push
        run: |
          bash tools/git-push.sh "${{ needs.init.outputs.branch }}" "Chaos Monkey report

          Co-Authored-By: agent:chaos-monkey <agent@dev-crew>"

  # ---------------------------------------------------------------------------
  # Stage 3: Synthesize all findings and create PR
  # ---------------------------------------------------------------------------
  synthesize:
    name: "Team Leader — Synthesize"
    needs: [init, quality-oracle, dependency-auditor, performance-profiler, chaos-monkey]
    if: always() && needs.init.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.init.outputs.branch }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup Claude credentials
        env:
          CLAUDE_CREDENTIALS: ${{ secrets.CLAUDE_CREDENTIALS }}
        run: bash tools/setup-claude-credentials.sh

      - name: Download pipeline state
        uses: actions/download-artifact@v4
        with:
          name: pipeline-state-inspector
          path: tools/

      - name: Synthesize Report
        run: |
          printf 'Synthesize all agent reports into a graded report (A-F).\nRead: quality-oracle-report.md, dependency-auditor-report.md, and any performance-profiler-report.md / chaos-monkey-report.md if present.\nGenerate inspector-report.md with JSON bug backlog. Escalate P1 findings.' > /tmp/prompt.txt

          claude --model claude-sonnet-4-6 \
            --system-prompt "$(cat $TEAM_DIR/team-leader.md)" \
            --allowedTools "Read,Write,Glob,Grep" \
            --print \
            --dangerously-skip-permissions \
            "$(cat /tmp/prompt.txt)" > inspector-report.md

      - name: Dashboard — finalize
        if: always()
        run: |
          bash tools/pipeline-update.sh --team TheInspector --run ${{ needs.init.outputs.run_id }} \
            --agent team-leader --action complete --verdict "Audit complete"

      - name: Check severity
        id: check
        run: |
          if grep -qE "Grade: [FD]|P1" inspector-report.md 2>/dev/null; then
            echo "has_critical=true" >> $GITHUB_OUTPUT
          else
            echo "has_critical=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit report
        run: |
          DATE=$(date +%Y-%m-%d)
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          mkdir -p Reports
          cp inspector-report.md "Reports/inspector-${DATE}.md"
          cp spec-drift-report.json "Reports/spec-drift-${DATE}.json" 2>/dev/null || true
          bash tools/git-push.sh "${{ needs.init.outputs.branch }}" "Inspector report ${DATE}

          Co-Authored-By: agent:inspector <agent@dev-crew>"

      - name: Create PR
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ needs.init.outputs.branch }}';
            const date = new Date().toISOString().split('T')[0];
            const hasCritical = '${{ steps.check.outputs.has_critical }}' === 'true';
            const isDynamic = '${{ inputs.mode }}' === 'dynamic';

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Inspector] Health audit ${date}`,
              head: branch,
              base: context.payload.repository.default_branch,
              draft: !hasCritical,
              body: [
                '## Health Audit Findings',
                `**Date:** ${date} | **Mode:** ${{ inputs.mode || 'static' }}`,
                hasCritical
                  ? '\n> ⚠️ **Critical or high-priority findings detected** — review before merging.\n'
                  : '\n> ℹ️ No critical findings. Draft PR for record-keeping — merge or close.\n',
                '## Pipeline',
                '- [x] Quality Oracle',
                '- [x] Dependency Auditor',
                isDynamic ? '- [x] Performance Profiler' : '- [ ] Performance Profiler (static mode — skipped)',
                isDynamic ? '- [x] Chaos Monkey' : '- [ ] Chaos Monkey (static mode — skipped)',
                '- [x] Team Leader Synthesis',
                '',
                '## Report',
                'See `Reports/` directory for full output.',
                '',
                '🔍 Generated by dev-crew TheInspector pipeline',
              ].join('\n'),
            });

            if (hasCritical) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.data.number,
                labels: ['audit', 'agent:fix'],
              });
            }
            console.log(`PR: #${pr.data.number}`);
