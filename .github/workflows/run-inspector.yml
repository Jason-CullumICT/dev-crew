name: Run TheInspector

on:
  # Scheduled: nightly health audit
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily — adjust to suit

  # Manual: trigger from a PR badge button or the Actions tab
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to audit (leave blank for default branch)'
        required: false
        default: ''
      focus:
        description: 'Optional focus areas (e.g. "auth routes, work item state machine")'
        required: false
        default: ''

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

