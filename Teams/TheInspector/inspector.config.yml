# TheInspector Configuration (OPTIONAL)
# ──────────────────────────────────────────────────────────────
# This file is OPTIONAL. Specialists auto-discover project context
# from CLAUDE.md and the codebase. Use this file to override or
# add precision that auto-discovery can't provide (e.g., specific
# threat scenarios, exact latency budgets, custom chaos tests).
#
# If this file doesn't exist, specialists will:
# - Read CLAUDE.md for service URLs, ports, tech stack
# - Scan source dirs for route files, test files, package manifests
# - Use sensible defaults for latency budgets and grading
# ──────────────────────────────────────────────────────────────

project:
  name: "dev-crew Source App"   # Work item workflow management system
  domain: "web-application"     # Express REST API + React SPA

# ── Services ──────────────────────────────────────────────────
# Define your running services for dynamic-mode testing.
# Each service needs a health endpoint for availability detection.
services:
  - name: backend
    health: http://localhost:3001/
    metrics: http://localhost:3001/metrics
    port: 3001
  - name: frontend
    health: http://localhost:5173
    port: 5173

# ── Specifications ────────────────────────────────────────────
# Where your domain truth lives. Quality oracle uses these for drift analysis.
specs:
  dir: "Specifications/"                     # Root directory for domain specs
  implementation_dir: "Specifications/Implementation/"  # Implementation-level specs
  patterns:
    traceability: "FR-\\d+"                  # Regex for requirement IDs in code comments (e.g., // Verifies: FR-001)
    enforcer: "python3 tools/traceability-enforcer.py"  # Command to run traceability check (optional)

# ── Source Code ───────────────────────────────────────────────
# Where your source code lives. Used for scoping and analysis.
source:
  dirs:
    - "Source/"                               # Main source directory
  test_dirs:
    - "Source/Backend/tests/"
    - "Source/Frontend/tests/"
  exclude:
    - "node_modules/"
    - ".git/"
    - "dist/"
    - "build/"

# ── Security ──────────────────────────────────────────────────
# Domain-specific security context for the red teamer.
security:
  # Critical operations that constitute P1 if compromised
  critical_operations:
    - "work item state machine integrity (VALID_STATUS_TRANSITIONS)"
    - "assessment verdict assignment (blocks/unblocks routing)"
    - "work item deletion (soft-delete via deleted flag)"
    - "in-memory store consistency (concurrent modification)"

  # Domain-specific threat scenarios for this work item workflow system.
  # No authentication layer exists — focus is on data integrity and state machine abuse.
  threat_scenarios:
    - name: "Invalid state transition"
      description: "Caller forces a WorkItem into a status not permitted by VALID_STATUS_TRANSITIONS"
      entry_points: ["/api/work-items/:id/transition", "/api/work-items/:id/workflow"]
    - name: "Phantom work item access"
      description: "Caller reads or modifies a soft-deleted work item via direct ID reference"
      entry_points: ["/api/work-items/:id"]
    - name: "Assessment verdict injection"
      description: "Caller submits a malformed AssessmentVerdict that bypasses routing logic"
      entry_points: ["/api/work-items/:id/assessment"]
    - name: "Store key collision"
      description: "Work item ID crafted to overwrite an existing store entry"
      entry_points: ["/api/work-items (POST)"]
    - name: "Unbounded list exfiltration"
      description: "GET /api/work-items returns all items with no pagination limit"
      entry_points: ["/api/work-items"]

  # OWASP categories to always check (generic, not domain-specific)
  owasp_always:
    - "A01: Broken Access Control"
    - "A02: Cryptographic Failures"
    - "A03: Injection"
    - "A07: Authentication Failures"

# ── Performance ───────────────────────────────────────────────
# Latency budgets and performance expectations.
performance:
  latency_budgets:
    p95_default_ms: 200           # In-memory store — all ops should be fast
    p99_default_ms: 500
    critical_paths:
      - path: "/api/work-items"
        p95_ms: 100               # List should be near-instant (no DB)
      - path: "/api/dashboard"
        p95_ms: 150

  # Patterns to detect in static analysis
  static_checks:
    - "Unbounded Map iteration (no slice/limit on work item list)"
    - "Synchronous I/O in request handlers (should be none — all in-memory)"
    - "Large payload serialization on GET /api/work-items"
    - "Missing input validation on request body fields"

# ── Chaos Testing ─────────────────────────────────────────────
# Fault injection scenarios for the chaos monkey.
chaos:
  mcp_tools: auto-discover        # "auto-discover" or explicit list of MCP tool names
  fault_scenarios:
    - name: "Backend restart"
      description: "Kill and restart the backend — verify recovery (all in-memory data lost by design)"
      type: "process-kill"
      target: "backend"
      expect: "process restarts, 503 during downtime, no crash loop"
    - name: "Concurrent state transitions"
      description: "Send two conflicting transition requests for the same work item simultaneously"
      type: "static-analysis"
      expect: "state machine rejects one transition, no corrupt state"
    - name: "Malformed request body"
      description: "Send requests with missing required fields, wrong types, extra unknown fields"
      type: "static-analysis"
      expect: "400 with { error: message }, no 500, no unhandled exceptions"

# ── Grading ───────────────────────────────────────────────────
# How to assign the overall health grade.
grading:
  A: { max_p1: 0, max_p2: 3, min_spec_coverage: 80 }
  B: { max_p1: 0, max_p2: 8, min_spec_coverage: 60 }
  C: { max_p1: 2, max_p2: 15, min_spec_coverage: 40 }
  D: { max_p1: 999 }             # Anything worse = D
  # F is reserved for: exploitable auth bypass + critical domain failure

# ── Report ────────────────────────────────────────────────────
report:
  output_dir: "Teams/TheInspector/findings/"   # matches findings/README.md convention
  filename_pattern: "audit-{date}-{grade}.html"
  backlog_pattern: "bug-backlog-{date}.json"
