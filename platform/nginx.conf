server {
    listen 80;
    server_name _;

    # Pipeline state JSON files
    location /pipeline/ {
        alias /usr/share/nginx/html/pipeline/;
        autoindex on;
        add_header Access-Control-Allow-Origin *;
        types {
            application/json json;
            text/html html;
        }
    }

    # Test results and reports
    location /test-results/ {
        alias /usr/share/nginx/html/test-results/;
        autoindex on;
        add_header Access-Control-Allow-Origin *;
    }

    # Workspace reports (inspector audits, coverage reports)
    location /reports/ {
        alias /usr/share/nginx/html/workspace/docs/superpowers/reports/;
        autoindex on;
        add_header Access-Control-Allow-Origin *;
    }

    # Default
    location / {
        return 200 '{"status":"ok","endpoints":["/pipeline/","/test-results/","/reports/"]}';
        add_header Content-Type application/json;
    }
}
